name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - bingo-reversible-online
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local version
        uses: actions/checkout@v4
        with:
          ref: main
          path: local

      - name: Checkout online version
        uses: actions/checkout@v4
        with:
          ref: bingo-reversible-online
          path: online-source

      - name: Assemble the website
        run: |
          mkdir -p site/online
          rsync -a --exclude='.git' --exclude='.github' local/ site/
          rsync -a --exclude='.git' --exclude='.github' online-source/ site/online/
          if [ -f site/online/online.html ]; then
            cp site/online/online.html site/online/index.html
          fi
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
